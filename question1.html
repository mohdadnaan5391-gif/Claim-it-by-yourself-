<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question 1 ❤️</title><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9a9e);
position:relative;
padding:20px;
}

.sparkle{
position:absolute;
font-size:24px;
opacity:.7;
animation:float 10s linear infinite;
}

.sparkle:nth-child(1){left:10%;animation-delay:0s;}
.sparkle:nth-child(2){left:25%;animation-delay:2s;}
.sparkle:nth-child(3){left:45%;animation-delay:4s;}
.sparkle:nth-child(4){left:70%;animation-delay:1s;}
.sparkle:nth-child(5){left:85%;animation-delay:3s;}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120px);
opacity:0;
}
}

.box{
width:100%;
max-width:550px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border-radius:30px;
padding:30px;
text-align:center;
color:white;
box-shadow:0 8px 35px rgba(0,0,0,.25);
animation:fadeIn 1s ease;
z-index:5;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.title{
font-family:'Pacifico',cursive;
font-size:34px;
animation:heartbeat 1.5s infinite;
}

@keyframes heartbeat{
0%,100%{transform:scale(1);}
25%{transform:scale(1.08);}
50%{transform:scale(1);}
75%{transform:scale(1.08);}
}

.subtitle{
margin-top:10px;
opacity:.9;
font-size:15px;
}

.progress{
width:100%;
height:12px;
background:rgba(255,255,255,.2);
border-radius:30px;
margin:20px 0;
overflow:hidden;
}

.progress-fill{
width:10%;
height:100%;
background:white;
}

.question{
font-size:24px;
font-weight:600;
margin:25px 0;
line-height:1.5;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
text-align:center;
outline:none;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
font-size:18px;
font-weight:700;
cursor:pointer;
animation:glow 2s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 5px white;}
50%{box-shadow:0 0 25px white;}
100%{box-shadow:0 0 5px white;}
}

.popup{
margin-top:15px;
font-size:18px;
min-height:30px;
}
</style></head>
<body><div class="sparkle">✨</div>
<div class="sparkle">✨</div>
<div class="sparkle">✨</div>
<div class="sparkle">✨</div>
<div class="sparkle">✨</div><div class="box" id="quizBox"><h1 class="title">❤️ Question 1 of 10 ❤️</h1><p class="subtitle">
✨ A Little Journey Made Especially For Arfa ✨
</p><div class="progress">
<div class="progress-fill"></div>
</div><div class="question">
Arfa ❤️, let's start with something simple...
<br><br>
Do you remember my birth date? 🥺
</div><input
type="text"
id="answer"
placeholder="Type your answer here..."

«»

<button onclick="checkAnswer()">
Submit ❤️
</button><div class="popup" id="popup"></div></div><script>

let tries = 0;

function checkAnswer(){

let answer =
document.getElementById("answer")
.value
.toLowerCase()
.trim();

if(
answer === "30-04-2006" ||
answer === "30-4-2006" ||
answer === "30 april"
){

document.getElementById("quizBox").innerHTML = `
<h1 class="title">❤️ Correct ❤️</h1>

<p style="margin-top:20px;font-size:20px;">
Of course you remember it 😊
</p>

<button onclick="window.location.href='question2.html'">
Next Question ➜
</button>
`;

}else{

tries++;

if(tries===1){

document.getElementById("popup").innerHTML =
"💔 Not quite, Arfa... Try again ❤️";

}else if(tries===2){

document.getElementById("popup").innerHTML =
"🥺 Still not right... Think a little harder ❤️";

}else{

document.getElementById("quizBox").innerHTML = `
<h1>😔</h1>

<h2 style="margin-top:10px;">
Arfa, it's a little sad to see that you don't remember my birth date.
</h2>

<p style="margin-top:15px;">
But that's okay. Some memories deserve a gentle reminder.
</p>

<p style="
margin-top:20px;
font-size:24px;
font-weight:bold;
">
❤️ My birth date is 30 April 2006 ❤️
</p>

<button onclick="window.location.href='question2.html'">
Continue ➜
</button>
`;

}

}

}

</script></body>
</html>
